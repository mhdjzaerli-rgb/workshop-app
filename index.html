<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الجُبَب – الورشة</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3742fa">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  direction: rtl;
  background:#eef1f5;
  margin:0;
  transition:.3s;
}
.app{
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  padding: 15px;
}

.main{
  flex: 1 1 600px;
  min-width: 300px;
}

select,input,button{
  width:100%;
  padding:8px;
  margin:5px 0;
}

button.green{background:#2ed573;color:white;border:none; min-height:40px; font-size:14px;}
button.blue{background:#3742fa;color:white;border:none; min-height:40px; font-size:14px;}
button.gray{background:#57606f;color:white;border:none; min-height:40px; font-size:14px;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  overflow-x: auto;
  display: block;
}
th,td{
  border:1px solid #ccc;
  padding:6px;
  font-size:14px;
  text-align:center;
}
th{background:#f1f2f6}

.action{cursor:pointer;color:white;padding:3px 6px;border-radius:4px}
.edit{background:orange}
.delete{background:red}

.report{
  margin-top:10px;
  background:#f8f9fa;
  padding:10px;
  border-radius:8px;
}

/* الوضع الليلي */
body.dark{background:#1e1e1e;color:#eee}
body.dark th{background:#333;color:#eee}
body.dark td{background:#2a2a2a;color:#eee}
body.dark input,body.dark select{
  background:#333;color:#fff;border:1px solid #555
}
body.dark .report{background:#333}

/* Footer / أزرار إضافات ووضع ليلي */
.footer{
  width: 100%;
  margin-top:15px;
  padding-top:10px;
  border-top:2px dashed #ccc;
}

/* Responsive للهواتف */
@media screen and (max-width:768px){
  .app{
    flex-direction: column;
  }
  select,input,button{
    width:100%;
  }
  table th, table td{
    font-size: 12px;
    padding:4px;
  }
}
</style>
</head>

<body>

<div class="app">

<h2>تسجيل الجُبَب</h2>

<select id="employee"></select>
<select id="model"></select>
<select id="size">
<option>M</option><option>L</option><option>XL</option>
<option>XXL</option><option>3XL</option>
</select>
<select id="color"></select>

<input id="qty" type="number" placeholder="العدد">

<button class="green" onclick="addOrUpdate()">حفظ</button>

<hr>

<h3>📅 تقرير شهري</h3>
<input type="month" id="monthPicker">
<button class="blue" onclick="generateReport()">عرض التقرير</button>
<button class="blue" onclick="exportExcel()">تصدير Excel</button>

<table>
<thead>
<tr>
<th>الموظفة</th><th>الموديل</th><th>المقاس</th>
<th>اللون</th><th>العدد</th><th>التاريخ</th><th>إجراء</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="report" id="report"></div>

<div class="footer">
<h3>➕ إضافات</h3>

<input id="newEmployee" placeholder="موظفة جديدة">
<button class="gray" onclick="addEmployee()">إضافة موظفة</button>

<input id="newModel" placeholder="موديل جديد">
<button class="gray" onclick="addModel()">إضافة موديل</button>

<input id="newColor" placeholder="لون جديد">
<button class="gray" onclick="addColor()">إضافة لون</button>

<button class="blue" onclick="toggleDark()">🌙 وضع ليلي</button>
</div>

</div>

<script>
let employees=JSON.parse(localStorage.getItem("employees"))||["ناريمان","مينا","شاهيناز","سويكي"];
let models=JSON.parse(localStorage.getItem("models"))||["كنفة","معينات","مربعات","غالون","كولفي"];
let colors=JSON.parse(localStorage.getItem("colors"))||["احمر","موف","ميلكا","زيتي","بلونوي","غرونا","بيستاش","فيردو","تركواز","بيج","زهر","ازرق"];
let records=JSON.parse(localStorage.getItem("records"))||[];
let editIndex=null;

function save(){
  localStorage.setItem("employees",JSON.stringify(employees));
  localStorage.setItem("models",JSON.stringify(models));
  localStorage.setItem("colors",JSON.stringify(colors));
  localStorage.setItem("records",JSON.stringify(records));
}

function fill(id,list){
  let s=document.getElementById(id); s.innerHTML="";
  list.forEach(v=>s.innerHTML+=`<option>${v}</option>`);
}

function render(){
  fill("employee",employees);
  fill("model",models);
  fill("color",colors);

  table.innerHTML="";
  records.forEach((r,i)=>{
    table.innerHTML+=`
    <tr>
    <td>${r.employee}</td>
    <td>${r.model}</td>
    <td>${r.size}</td>
    <td>${r.color}</td>
    <td>${r.qty}</td>
    <td>${r.date}</td>
    <td>
      <span class="action edit" onclick="edit(${i})">✏️</span>
      <span class="action delete" onclick="del(${i})">🗑</span>
    </td>
    </tr>`;
  });
  save();
}

function addOrUpdate(){
  let r={
    employee:employee.value,
    model:model.value,
    size:size.value,
    color:color.value,
    qty:+qty.value,
    date:new Date().toISOString().slice(0,10)
  };
  editIndex==null?records.push(r):records[editIndex]=r;
  editIndex=null; qty.value="";
  render();
}

function edit(i){
  let r=records[i];
  employee.value=r.employee;
  model.value=r.model;
  size.value=r.size;
  color.value=r.color;
  qty.value=r.qty;
  editIndex=i;
}

function del(i){
  if(confirm("حذف السجل؟")){
    records.splice(i,1);
    render();
  }
}

function addEmployee(){if(newEmployee.value){employees.push(newEmployee.value);newEmployee.value="";render();}}
function addModel(){if(newModel.value){models.push(newModel.value);newModel.value="";render();}}
function addColor(){if(newColor.value){colors.push(newColor.value);newColor.value="";render();}}

function generateReport(){
  let m=monthPicker.value;
  if(!m)return;
  let totals={};
  records.filter(r=>r.date.startsWith(m))
    .forEach(r=>totals[r.employee]=(totals[r.employee]||0)+r.qty);
  let out="<b>الإجمالي الشهري:</b><br>";
  for(let e in totals) out+=`👩 ${e}: ${totals[e]}<br>`;
  report.innerHTML=out;
}

function exportExcel(){
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(records),"السجلات");
  XLSX.writeFile(wb,"workshop.xlsx");
}

function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")==="true")document.body.classList.add("dark");

/* تسجيل Service Worker */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

render();
</script>

</body>
</html>
